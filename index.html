<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FilmsGeo</title>
</head>
<body>
     <header>
        <nav>
            <div class="logo">FilmsGeo</div>
            <ul>
                <li>Home</li>
                <li>Popular Films</li>
                <li>Latest Films</li>
                <li>My Films</li>
            </ul>

            <div class="srchLogin">

                <img class="srch" src="images/search.png" alt="">
                <a class="lgn" href="">Login in</a>
            </div>
        </nav>
     </header>


     <main>

        <div class="top_photoSec">
                <img class="top tp1" src="images/breaking-bad.jpg" alt="">
                
                <img class="top tp2 " src="images/supernatural.jpg" alt="">
        </div>

         <div class="trending_movies">  
                <div class="txt_area1">
                    <h2>The Most Trending Now</h2>
                </div>
                <div class="films-wrapper">
                    <button class="arrow left">◀</button>
                <div class="films">
                    
                     <img class="film " src="images/film1.webp" alt="">
                     <img class="film " src="images/film2.webp" alt="">
                     <img class="film " src="images/film3.webp" alt="">
                     <img class="film " src="images/film4.webp" alt="">
                     <img class="film " src="images/film5.webp" alt="">
                     <img class="film " src="images/film6.jpg" alt="">
                     <img class="film " src="images/film7.jpg" alt="">
                     <img class="film " src="images/film8.jpg" alt="">
                     <img class="film " src="images/film9.jpg" alt="">
                     <img class="film " src="images/film10.jpg" alt="">
                    </div>
                     <button class="arrow right">▶</button>
               
                </div>
         </div>

         <div class="popular_films">

            <h2>Popular Films</h2>

            <div class="films_wrapper2">
                
                    <button class="arrow left">◀</button>
                 
                    <div class="films2">
                     <img class="film " src="images/ppl1.webp" alt="">
                     <img class="film " src="images/ppl2.svg" alt="">
                     <img class="film " src="images/ppl3.svg" alt="">
                     <img class="film " src="images/ppl4.svg" alt="">
                     <img class="film " src="images/ppl5.svg" alt="">
                     <img class="film " src="images/ppl6.webp" alt="">
                     <img class="film " src="images/ppl7.webp" alt="">
                     
                    </div>
                     <button class="arrow right">▶</button>
            </div>
            
         </div>
         

     </main>


    <script src="main.js"></script>
</body>
</html>
